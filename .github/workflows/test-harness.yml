name: Test Harness

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Download dependencies
        run: go mod download

      - name: Run all tests
        run: go test -v ./...

      - name: Run integration tests
        run: go test -v ./test/scenarios/...

      - name: Run e2e tests
        run: go test -v ./test/e2e/...

      - name: Generate coverage report
        run: |
          # Only test packages with test files to avoid "no such tool covdata" errors
          go test -coverprofile=coverage.out -covermode=atomic \
            ./internal/app \
            ./internal/cache \
            ./internal/catalog \
            ./internal/config \
            ./internal/github \
            ./internal/ingest \
            ./internal/migrate \
            ./internal/operations \
            ./internal/tui \
            ./internal/util \
            ./test/fixtures \
            ./test/mockserver \
            ./test/scenarios \
            ./test/e2e

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.out
          retention-days: 30
