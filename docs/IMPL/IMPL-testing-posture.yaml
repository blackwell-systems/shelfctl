interface_contracts:
    - name: MockServerAssetEndpoint
      description: GitHub API Asset JSON schema for mock server responses
      definition: |
        // Asset struct must match GitHub API schema exactly
        type Asset struct {
            ID                 int64  `json:"id"`              // MUST be int64, not string
            Name               string `json:"name"`
            Size               int64  `json:"size"`
            URL                string `json:"url"`
            BrowserDownloadURL string `json:"browser_download_url"`
            ContentType        string `json:"content_type"`
        }

        // ListReleaseAssets returns []Asset, not single Asset
        func (ms *MockServer) handleGetReleaseAssets(w http.ResponseWriter, r *http.Request, owner, repo, releaseID string) {
            assets := []Asset{...}  // Array, not single object
            json.NewEncoder(w).Encode(assets)
        }
      location: test/mockserver/server.go
    - name: TestHarnessSetup
      description: Standard test harness initialization pattern for all integration tests
      definition: |
        // All integration tests must follow this setup pattern
        func TestXxx(t *testing.T) {
            // Setup mock server
            srv, err := mockserver.NewServer()
            if err != nil {
                t.Fatalf("failed to create mock server: %v", err)
            }
            if err := srv.Start(); err != nil {
                t.Fatalf("failed to start mock server: %v", err)
            }
            defer func() {
                if err := srv.Stop(); err != nil {
                    t.Errorf("failed to stop mock server: %v", err)
                }
            }()

            // Create temp directory
            tmpDir, err := os.MkdirTemp("", "test-*")
            if err != nil {
                t.Fatalf("failed to create temp dir: %v", err)
            }
            defer func() { _ = os.RemoveAll(tmpDir) }()

            // Load fixtures
            fixtures := fixtures.DefaultFixtures()

            // Create GitHub client pointing to mock server
            ghClient := github.New("mock-token", srv.URL())

            // ... test implementation
        }
      location: test/scenarios/browse_test.go
waves:
    - number: 1
      agents:
        - id: A
          task: |
            ## What to Implement

            Fix mock server GitHub API contract mismatches to make integration tests pass.

            **Root cause:** Asset endpoint returns string IDs instead of int64, causing
            unmarshal errors in 6/13 integration tests.

            **Changes required:**
            1. Fix `handleGetReleaseAssets` (line 167) to return `[]Asset` with int64 IDs
            2. Currently line 178 has: `"id": bookID,` where bookID is a string map key
            3. Change to: `"id": int64(hashString(bookID)),` to generate numeric IDs
            4. Add helper function `hashString(s string) int64` for deterministic string→int64 conversion
            5. Ensure all Asset JSON responses use int64 for ID field
            6. Verify Release endpoint returns single Release object (not array)

            **Implementation:**
            - Modify `handleGetReleaseAssets` asset construction loop (lines 176-182)
            - Add helper function to convert string book IDs to int64 (use simple hash or counter)
            - Test with: `go test ./test/scenarios/...` - all 13 tests must pass

            **Interfaces:** Implements MockServerAssetEndpoint contract

            **Tests:** Run full test suite after changes: `go test ./...`

            **Verification gate:**
            ```bash
            go build ./...
            go vet ./...
            gofmt -l .
            go test ./test/scenarios/... -v
            ```

            **Constraints:**
            - Do not change Asset struct in internal/github/assets.go
            - Only modify mock server code in test/mockserver/
            - Preserve existing fixture data structure
          files:
            - test/mockserver/server.go
