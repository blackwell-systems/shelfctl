pre_mortem:
  overall_risk: medium
  rows:
  - scenario: Mock server schema changes break existing tests outside test/scenarios
    likelihood: medium
    impact: medium
    mitigation: Agent A runs full test suite (go test ./...) after mock server changes, not just integration tests
  - scenario: TUI tests flake due to bubbletea state assumptions
    likelihood: low
    impact: low
    mitigation: Agents I, J, K test only business logic, avoid bubbletea rendering. Use state inspection, not UI output.
  - scenario: E2E tests have hidden dependencies on each other
    likelihood: medium
    impact: low
    mitigation: Agents N and O use t.Cleanup() for all teardown, run tests with -shuffle flag during development
  - scenario: Coverage targets unrealistic for non-testable code
    likelihood: low
    impact: low
    mitigation: Coverage targets are guidelines, not hard requirements. Focus on critical paths first.
  - scenario: CI workflow fails due to GitHub Actions config errors
    likelihood: low
    impact: low
    mitigation: Agent P tests workflow locally with act before committing, or validates YAML syntax
