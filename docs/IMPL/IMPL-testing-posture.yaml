      \n**Changes required:**\n1. Fix `handleGetReleaseAssets` (line 167) to return `[]Asset` with int64 IDs\n2. Currently\
      \ line 178 has: `\"id\": bookID,` where bookID is a string map key\n3. Change to: `\"id\": int64(hashString(bookID)),`\
      \ to generate numeric IDs\n4. Add helper function `hashString(s string) int64` for deterministic string\u2192int64 conversion\n\
      5. Ensure all Asset JSON responses use int64 for ID field\n6. Verify Release endpoint returns single Release object\
      \ (not array)\n\n**Implementation:**\n- Modify `handleGetReleaseAssets` asset construction loop (lines 176-182)\n- Add\
      \ helper function to convert string book IDs to int64 (use simple hash or counter)\n- Test with: `go test ./test/scenarios/...`\
      \ - all 13 tests must pass\n\n**Interfaces:** Implements MockServerAssetEndpoint contract\n\n**Tests:** Run full test\
      \ suite after changes: `go test ./...`\n\n**Verification gate:**\n```bash\ngo build ./...\ngo vet ./...\ngofmt -l .\n\
      go test ./test/scenarios/... -v\n```\n\n**Constraints:**\n- Do not change Asset struct in internal/github/assets.go\n\
