interface_contracts:
- name: MockServerAssetEndpoint
  description: GitHub API Asset JSON schema for mock server responses
  definition: "// Asset struct must match GitHub API schema exactly\ntype Asset struct {\n    ID                 int64  `json:\"\
    id\"`              // MUST be int64, not string\n    Name               string `json:\"name\"`\n    Size             \
    \  int64  `json:\"size\"`\n    URL                string `json:\"url\"`\n    BrowserDownloadURL string `json:\"browser_download_url\"\
    `\n    ContentType        string `json:\"content_type\"`\n}\n\n// ListReleaseAssets returns []Asset, not single Asset\n\
    func (ms *MockServer) handleGetReleaseAssets(w http.ResponseWriter, r *http.Request, owner, repo, releaseID string) {\n\
    \    assets := []Asset{...}  // Array, not single object\n    json.NewEncoder(w).Encode(assets)\n}\n"
  location: test/mockserver/server.go
- name: TestHarnessSetup
  description: Standard test harness initialization pattern for all integration tests
  definition: "// All integration tests must follow this setup pattern\nfunc TestXxx(t *testing.T) {\n    // Setup mock server\n\
    \    srv, err := mockserver.NewServer()\n    if err != nil {\n        t.Fatalf(\"failed to create mock server: %v\", err)\n\
    \    }\n    if err := srv.Start(); err != nil {\n        t.Fatalf(\"failed to start mock server: %v\", err)\n    }\n \
    \   defer func() {\n        if err := srv.Stop(); err != nil {\n            t.Errorf(\"failed to stop mock server: %v\"\
    , err)\n        }\n    }()\n\n    // Create temp directory\n    tmpDir, err := os.MkdirTemp(\"\", \"test-*\")\n    if\
    \ err != nil {\n        t.Fatalf(\"failed to create temp dir: %v\", err)\n    }\n    defer func() { _ = os.RemoveAll(tmpDir)\
    \ }()\n\n    // Load fixtures\n    fixtures := fixtures.DefaultFixtures()\n\n    // Create GitHub client pointing to mock\
    \ server\n    ghClient := github.New(\"mock-token\", srv.URL())\n\n    // ... test implementation\n}\n"
  location: test/scenarios/browse_test.go
