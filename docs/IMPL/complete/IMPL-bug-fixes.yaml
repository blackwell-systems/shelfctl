            ### `internal/app/shelve.go` (line 480 — uploadAsset function)

            The goroutine calls `gh.UploadAsset(...)`. When `tui.ShowProgress` returns
            (cancel or error), the goroutine keeps running.

            Fix: create a `context.WithCancel` before the goroutine. Pass the context
            to `gh.UploadAsset` (add `ctx context.Context` as first argument to
            `UploadAsset` if the GitHub client supports it — check `github/client.go`
            first; if it doesn't accept context yet, skip context plumbing and instead
            drain the errCh after cancelling to ensure the goroutine exits):
            ```go
            ctx, cancel := context.WithCancel(context.Background())
            go func() {
                // ... existing goroutine body ...
            }()
            label := ...
            if err := tui.ShowProgress(label, size, progressCh); err != nil {
                cancel() // signal goroutine to stop
                <-errCh  // wait for goroutine to exit before returning
                return err
            }
            cancel() // normal completion
            ```

            If `UploadAsset`/`DownloadAsset` don't accept context, the drain pattern
            (`<-errCh` after cancel signal) is sufficient to prevent goroutine leaks.

            ### `internal/app/open.go` (line 64 — download goroutine)

            Same pattern: add cancel + drain of errCh when ShowProgress returns error.

