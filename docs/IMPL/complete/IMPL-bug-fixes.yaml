          task: |
            ## What to Implement

            Fix BUG 26 in `internal/app/edit_book.go`,
            BUG 24 in `internal/app/open.go` (case-sensitivity),
            and BUG 2 in `internal/github/client.go`.

            **BUG 26 — non-deterministic tag order (LOW)**
            In `edit_book.go` (line 270-273):
            ```go
            tags := []string{}
            for t := range tagSet {   // map iteration = random order
                tags = append(tags, t)
            }
            updatedBook.Tags = tags
            ```
            Each edit causes a spurious catalog diff because tags are in a
            different order every run.

            Fix: sort the tags slice after building it:
            ```go
            import "sort"
            ...
            tags := []string{}
            for t := range tagSet {
                tags = append(tags, t)
            }
            sort.Strings(tags)
            updatedBook.Tags = tags
            ```

            **BUG 24 — isPDF case-sensitive (LOW)**
            `open.go` defines `isPDF` checking only `".pdf"` (lowercase). PDFs
            with `.PDF` extension are not recognised.
            `cache/store.go` uses `strings.ToLower` correctly; `open.go` should match.

            Fix in `open.go`: wherever `isPDF` or an equivalent extension check is used:
            ```go
            strings.ToLower(filepath.Ext(filename)) == ".pdf"
            ```
            If there is a standalone `isPDF(filename string) bool` helper in `open.go`,
            update it to use `strings.ToLower`. If the same function is duplicated in
            another file in the `app` package, note it as a TODO rather than touching
            the other file (leave cross-file deduplication for a separate refactor).

            **BUG 2 — checkStatus reads body after deferred close (LOW)**
            In `github/client.go` (line 86), `checkStatus` is called on a response
            whose body is already protected by `defer resp.Body.Close()` in the caller.
            `checkStatus` attempts to read the body for error details, but if the
            defer has already fired it reads from a closed reader.

            This is a design smell rather than a crash risk (the read just returns
            empty/EOF). Fix: in `checkStatus`, do not read the body — return typed
            errors based on status code only (which is what the existing switch
            already does). If there is body-reading code in `checkStatus` for the
            default/error case, remove it or ensure it's called before the deferred
            close by reading eagerly in the caller.

            Read `internal/github/client.go` around line 86-110 to see the exact
            body-reading pattern before making changes.

            ## Tests to Write

