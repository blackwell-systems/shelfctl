            **BUG 13 — config load error replaced with empty config (MEDIUM)**
            In `addShelfToConfig` (line 157):
            ```go
            currentCfg, err := config.Load()
            if err != nil {
                currentCfg = &config.Config{}  // ← silently drops all existing shelves!
            }
