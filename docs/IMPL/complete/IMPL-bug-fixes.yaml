            ## What to Implement

            Fix BUG 27 in `internal/app/move.go`.

            **BUG 27 — cross-shelf move removes source before writing destination (HIGH)**
            In `updateCatalogsForCrossShelfMove` (around line 675), the current order is:
            1. Load src catalog
            2. Load dst catalog
            3. Remove book from src catalog → `gh.CommitFile` src (SOURCE REMOVED FIRST)
            4. Update book metadata
            5. Add book to dst catalog → `gh.CommitFile` dst

            If step 5 fails (network error, conflict), the book is already removed from
            source but never written to destination — book is permanently lost.

            **Fix:**
            Swap the ordering so destination is committed FIRST:
            1. Load src catalog
            2. Load dst catalog
            3. Update book metadata for destination
            4. Add book to dst catalog → `gh.CommitFile` dst  ← DESTINATION FIRST
            5. Remove book from src catalog → `gh.CommitFile` src  ← SOURCE AFTER

            In the worst case (step 5 fails), the book exists in BOTH catalogs, which
            is a recoverable duplicate rather than a permanent loss.

            The function to modify is `updateCatalogsForCrossShelfMove`.
            The cache removal before step 3 can remain in place (it's local, not network).

            ## Tests to Write

            No unit test needed (integration-level); verify ordering by code review.

