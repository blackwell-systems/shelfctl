            Fix BUG 10+11 and BUG 18 in `internal/app/migrate.go`.

            **BUG 10+11 — non-EOF read error breaks loop with wrong SHA256/size (MEDIUM)**
            In `fetchAndHash` (lines 221-228, approximate), the read loop is:
            ```go
            hr := ingest.NewReader(bytes.NewReader(fileData))
            buf := make([]byte, 32*1024)
            for {
                _, readErr := hr.Read(buf)
                if readErr != nil {
                    break   // breaks on ANY error, including non-EOF
                }
            }
            return fileData, hr.SHA256(), hr.Size(), nil
            ```
            If a non-EOF read error occurs (e.g., I/O error mid-stream), the loop
            breaks with a partial SHA256 and partial size. `UploadAsset` is then
            called with a wrong `ContentLength`, producing a corrupt/truncated asset.

            Fix: distinguish EOF from real errors:
            ```go
            for {
                _, readErr := hr.Read(buf)
                if readErr == io.EOF {
                    break
                }
                if readErr != nil {
                    return nil, "", 0, fmt.Errorf("hashing file: %w", readErr)
                }
            }
            ```
            Add `"io"` to imports if not already present.

