            ## What to Implement

            Fix BUG 8 in `internal/github/gitops.go`.

            **BUG 8 — pull--rebase runs after commit but asset already uploaded (MEDIUM)**
            Current flow in `CommitFile`:
            ```
            clone → write file → add → commit → pull --rebase → push
            ```
            If `pull --rebase` finds a conflict, it fails and the function returns
            an error. But the asset was already uploaded by the caller BEFORE
            `CommitFile` was called (e.g., in `shelve.go`: UploadAsset → CommitFile).
            So a conflict = asset on GitHub but catalog not updated.

            Fix: move `pull --rebase` to BEFORE the commit, so the sequence is:
            ```
            clone → pull --rebase → write file → add → commit → push
            ```
            This way, if rebase fails (conflict), no commit has happened yet and the
            caller can retry or handle the error cleanly. The asset is still uploaded
            by the caller before CommitFile is called, but at least the catalog state
            is consistent — if CommitFile fails, the catalog was never partially applied.

            The actual "asset before catalog" ordering in shelve.go is an architectural
            concern beyond the scope of this bug; the gitops.go fix ensures that the
            rebase step doesn't leave the catalog in a half-committed state.

            New sequence in `CommitFile`:
            ```go
            runGit(tmpDir, "clone", "--depth=1", cloneURL, ".")
            runGit(tmpDir, "pull", "--rebase")   // ← move here, BEFORE writing file
            // write file
            runGit(tmpDir, "config", "user.email", ...)
            runGit(tmpDir, "config", "user.name", ...)
            runGit(tmpDir, "add", filePath)
            runGit(tmpDir, "commit", "-m", message)
            runGit(tmpDir, "push")
            ```

            ## Tests to Write

            No unit test required (git subprocess integration); verify by code review.

            ## Verification Gate

            ```bash
            go build ./...
            go vet ./...
            go test ./internal/github/...
            ```

            ## Constraints

            - Only modify `internal/github/gitops.go`.
            - Do not change the function signature of `CommitFile`.
            - The `pull --rebase` after clone with `--depth=1` is valid git; the
              shallow clone will be deepened as needed by the rebase.
          files:
            - internal/github/gitops.go
