            ## What to Implement

            Fix BUG 3 in `internal/app/delete_book.go`.

            **BUG 3 — delete asset before catalog commit (HIGH)**
            In `deleteSingleBook` (line 279), the current order is:
            1. `gh.DeleteAsset(...)` — asset deleted from GitHub
            2. Load catalog, remove book entry
            3. `gh.CommitFile(...)` — catalog updated

            If the network fails between step 1 and step 3, the asset is gone but
            the catalog still references the book (orphaned catalog entry, unrecoverable).

            **Fix:**
            Reorder the operations so the catalog is committed FIRST:
            1. Load catalog, remove book entry, `gh.CommitFile(...)` commit catalog
            2. THEN `gh.DeleteAsset(...)` — delete asset from GitHub

            New order in `deleteSingleBook`:
            ```
            1. gh.GetReleaseByTag — find release
            2. gh.FindAsset       — find asset (to get asset.ID for later)
            3. gh.GetFileContent  — load catalog
            4. catalog.Remove     — remove entry
            5. catalog.Marshal    — marshal updated catalog
            6. gh.CommitFile      — commit catalog UPDATE FIRST
            7. gh.DeleteAsset     — delete asset AFTER catalog is safe
            8. cacheMgr.Remove    — clear local cache
            9. updateREADMEAfterRemove
            ```

            ## Tests to Write

            No unit test needed (integration-level GitHub operations); verify by
            code review that the ordering matches the spec above.

            ## Verification Gate

            ```bash
            go build ./...
            go vet ./...
            go test ./internal/app/...
            ```

            ## Constraints

            - Only modify `internal/app/delete_book.go`.
            - Do not change function signatures.
            - If `asset` is nil after FindAsset, return early before any commits.
