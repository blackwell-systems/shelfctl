            **BUG 17 — line duplication in AppendToShelfREADME when only Quick Stats exists (MEDIUM)**
            In `AppendToShelfREADME` (operations/readme.go around line 120), the
            `quickStatsIdx >= 0` branch uses an outer `for i, line` loop and an
            inner `for j` loop. When the inner `for j` loop exhausts the file
            without finding a next `##` heading, the outer loop continues and
            appends lines again, duplicating everything after Quick Stats.

            Fix: when the inner loop exits without returning, break out of the
            outer loop to prevent re-appending:
            ```go
            for i, line := range lines {
                result = append(result, line)
                if i == quickStatsIdx {
                    foundNextSection := false
                    for j := i + 1; j < len(lines); j++ {
                        result = append(result, lines[j])
                        if strings.HasPrefix(lines[j], "##") {
                            // Found next section — insert before it
                            result = result[:len(result)-1]
                            result = append(result, "")
                            result = append(result, "## Recently Added")
                            result = append(result, "")
                            result = append(result, bookEntry)
                            result = append(result, "")
                            result = append(result, lines[j])
                            result = append(result, lines[j+1:]...)
                            return strings.Join(result, "\n")
                        }
                    }
                    // Inner loop exhausted without finding next section:
                    // append Recently Added at the end and stop outer loop
                    if !foundNextSection {
                        result = append(result, "")
                        result = append(result, "## Recently Added")
                        result = append(result, "")
                        result = append(result, bookEntry)
                        return strings.Join(result, "\n")
                    }
                    break
                }
            }
            ```

