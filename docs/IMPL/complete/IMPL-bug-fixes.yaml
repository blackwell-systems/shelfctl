            **BUG 4 — iterator invalidation in range loop (MEDIUM)**
            In `verifySingleShelf`, the "find orphaned catalog entries" loop (line 130):
            ```go
            for i := range books {
                b := &books[i]
                if _, exists := assetNames[b.Source.Asset]; !exists {
                    if fix {
                        books, _ = catalog.Remove(books, b.ID)  // modifies slice!
