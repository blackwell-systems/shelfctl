          task: |
            ## What to Implement

            Fix BUG 14 in `internal/ingest/pdfmeta.go` and
            BUG 16 in `internal/cache/html_index.go`.

            **BUG 14 — scanner buffer capped at 8192 bytes, scanner.Err() unchecked (LOW)**
            In `ExtractPDFMetadata` (pdfmeta.go line 30-38):
            ```go
            scanner := bufio.NewScanner(f)
            scanner.Buffer(make([]byte, 8192), 8192)
            ...
            for scanner.Scan() && lineCount < 500 {
                ...
            }
            // scanner.Err() never checked
            ```
            The 8192-byte buffer cap means that any PDF line longer than 8192 bytes
            causes `scanner.Scan()` to return false with a non-nil `scanner.Err()`
            that is silently ignored.

            Fix:
            1. Increase the max token size to 64KB (reasonable for PDF lines):
               ```go
               scanner.Buffer(make([]byte, 64*1024), 64*1024)
               ```
            2. After the scan loop, check `scanner.Err()`:
               ```go
               for scanner.Scan() && lineCount < 500 {
                   content.WriteString(scanner.Text())
                   content.WriteString("\n")
                   lineCount++
               }
               if err := scanner.Err(); err != nil {
                   // Non-fatal: log and continue with partial data
                   // (PDF metadata extraction is best-effort)
                   _ = err // or: return nil, fmt.Errorf("scanning pdf: %w", err)
               }
               ```
               Since metadata extraction is best-effort, logging and continuing is
               acceptable. Return partial results rather than failing completely.

            **BUG 16 — wrong cover path computation (LOW)**
            In `html_index.go` (line 646):
            ```go
            relCoverPath, _ := filepath.Rel(
                filepath.Dir(filepath.Join(book.FilePath, "..")),
                book.CoverPath,
            )
            ```
            `filepath.Dir(filepath.Join(book.FilePath, ".."))` is equivalent to
            `filepath.Dir(filepath.Dir(book.FilePath))` — it goes up TWO levels
            from the book file, not one. The error from `filepath.Rel` is also
            silently discarded.

            Fix:
            ```go
            indexDir := filepath.Dir(book.FilePath)  // directory containing index.html
            relCoverPath, err := filepath.Rel(indexDir, book.CoverPath)
            if err != nil {
                // Fall back to absolute path
                relCoverPath = book.CoverPath
            }
            fmt.Fprintf(s, `<img src="%s" alt="Cover">`, html.EscapeString(relCoverPath))
            ```

            ## Tests to Write

