          task: |
            ## What to Implement

            Fix BUG 12 and BUG 23 across `internal/app/delete.go` and
            `internal/app/helpers.go`.

            **BUG 12 — newShelves built from stale cfg.Shelves (LOW)**
            In `delete.go` (line 129):
            ```go
            newShelves := make([]config.ShelfConfig, 0, len(cfg.Shelves)-1)
            for _, s := range cfg.Shelves {        // iterates stale cfg.Shelves
                if s.Name != shelfName {
                    newShelves = append(newShelves, s)
                }
            }
            currentCfg, err := config.Load()      // loads fresh config
            ...
            currentCfg.Shelves = newShelves        // assigns stale list!
            ```
            If `cfg.Shelves` differs from `currentCfg.Shelves` (e.g., another
            process added a shelf), the freshly-loaded shelves are overwritten
            by the stale filtered list.

            Fix: build `newShelves` from `currentCfg.Shelves` instead:
            ```go
            currentCfg, err := config.Load()
            if err != nil {
                return fmt.Errorf("loading config: %w", err)
            }
            newShelves := make([]config.ShelfConfig, 0, len(currentCfg.Shelves))
            for _, s := range currentCfg.Shelves {   // use fresh config
                if s.Name != shelfName {
                    newShelves = append(newShelves, s)
                }
            }
            currentCfg.Shelves = newShelves
            ```

            **BUG 23 — fmt.Scanln breaks on shelf names with spaces (LOW)**
            In `delete.go` (line 121) and `helpers.go` (line 28):
            ```go
            var confirmation string
            _, _ = fmt.Scanln(&confirmation)
            ```
            `fmt.Scanln` stops at the first whitespace, so a shelf named
            "my books" would only read "my" and the confirmation always fails.

            Fix: use `bufio.NewReader(os.Stdin).ReadString('\n')` and
            `strings.TrimSpace` (same pattern already used in `cache.go`):
            ```go
            reader := bufio.NewReader(os.Stdin)
            confirmation, _ := reader.ReadString('\n')
            confirmation = strings.TrimSpace(confirmation)
            ```
            Apply this fix in both `delete.go` (shelf name confirmation) and
            `helpers.go` wherever `fmt.Scanln` is used for user-visible confirmations
            that could contain spaces.

