          task: |
            ## What to Implement

            Fix BUG 1 in `internal/catalog/manager.go`.

            **BUG 1 — Remove calls Save even when book not found (LOW)**
            In `Manager.Remove` (line 101-113):
            ```go
            func (m *Manager) Remove(bookID, commitMsg string) ([]Book, bool, error) {
                books, err := m.Load()
                ...
                books, found := Remove(books, bookID)
                if err := m.Save(books, commitMsg); err != nil {  // always called!
                    ...
                }
                return books, found, nil
            }
            ```
            When `found == false`, `m.Save` still commits an unchanged catalog to
            GitHub, creating a pointless git commit with no actual diff.

            Fix: guard `m.Save` with `if found`:
            ```go
            books, found := Remove(books, bookID)
            if found {
                if err := m.Save(books, commitMsg); err != nil {
                    return nil, found, err
                }
            }
            return books, found, nil
            ```

