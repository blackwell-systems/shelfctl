            **BUG 19 — eager HEAD request wastes 15s on slow servers (LOW)**
            In `resolveHTTP` (line 60-68), a HEAD request is made immediately at
            resolve time, even though the file may never actually be downloaded
            (e.g., dry-run mode). This is a design smell but safe to fix here:
            Defer the HEAD request to when `Open()` is called, or remove it and
            accept that `Size` will always be -1 for HTTP sources (progress bars
            will show indeterminate). The simpler fix is to remove the eager HEAD
            and just set `Size: -1` by default:
            ```go
            func resolveHTTP(url string) (*Source, error) {
                name := guessFilenameFromURL(url)
                client := &http.Client{Timeout: 30 * time.Second}
                return &Source{
                    Name: name,
                    Size: -1,
                    Open: func() (io.ReadCloser, error) {
                        r, err := client.Get(url)
                        if err != nil {
                            return nil, err
                        }
                        if r.StatusCode != http.StatusOK {
                            _ = r.Body.Close()
                            return nil, fmt.Errorf("get %s: status %d", url, r.StatusCode)
                        }
                        return r.Body, nil
                    },
                }, nil
            }
            ```
            This removes the 15-second blocking HEAD entirely.

