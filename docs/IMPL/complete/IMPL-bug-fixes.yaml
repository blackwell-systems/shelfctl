pre_mortem:
    overall_risk: medium
    rows:
        - scenario: |
            BUG 15 fix relies on cacheMgr.Path("","","","") returning the base cache directory. If that method returns something else (e.g., a file path ending in a filename), Agent A's fix will be wrong.
          likelihood: low
          impact: high
          mitigation: |
            Agent A must read internal/cache/manager.go before making the fix to confirm exactly what Path("","","","") returns.
        - scenario: |
            BUG 8 (move pull--rebase before write) may cause git to fail on the rebase step if the repo has diverged between clone and rebase. The --depth=1 clone fetches only the latest commit; a rebase may need more history.
          likelihood: low
          impact: medium
          mitigation: |
            If pull --rebase fails on shallow clone, consider using `git fetch --unshallow` or `git pull --rebase origin HEAD` with `--allow-unrelated-histories` as a fallback. Document in code comment.
        - scenario: |
            Agent E modifies four files (shelve.go, open.go, browse.go, sync.go) independently. If context.Context is not yet supported by gh.UploadAsset, the agent must use drain-only pattern — if it incorrectly adds a context parameter, the build will fail.
          likelihood: medium
          impact: medium
          mitigation: |
            Agent E must check github/client.go UploadAsset signature before writing any context-passing code. Use drain-only pattern if context not supported.
        - scenario: |
            BUG 27 fix swaps commit order in updateCatalogsForCrossShelfMove. If the destination CommitFile succeeds but source CommitFile fails, the book exists in both catalogs (duplicate). This is recoverable but visible.
          likelihood: low
          impact: low
          mitigation: |
            Duplicate is far better than data loss. Document the trade-off in a code comment. A future improvement can use two-phase commit with a tombstone entry.
        - scenario: |
            Agent M touches open.go (BUG 24) while Agent E also touches open.go (BUG 6 context cancel). This is a same-file conflict across agents in different waves.
          likelihood: high
          impact: low
          mitigation: |
            Agent E (Wave 2) completes before Agent M (Wave 3). Agent M must re-read open.go after Wave 2 merges to apply BUG 24 fix on top of Agent E's context changes. This is the correct cross-wave sequencing: M depends on E.
