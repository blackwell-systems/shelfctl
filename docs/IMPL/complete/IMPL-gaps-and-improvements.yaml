pre_mortem:
    overall_risk: medium
    rows:
        - scenario: Agent D's Year field addition changes field index constants (fieldYear=2 shifts fieldTags and fieldID up). If Agent D makes an off-by-one error in the constants or inputs slice size, the form will panic with an index-out-of-range at runtime.
          likelihood: medium
          impact: high
          mitigation: The test TestShelveForm_TabNavigation exercises tab through all fields including fieldCache; a panic would be caught immediately. The constraint explicitly lists the new constant values.
        - scenario: Agent F's ActionMove handler in browse.go requires tui.ActionMove defined by Agent E (Wave 1). If Agent E's constant name differs from what Agent F expects, the code won't compile.
          likelihood: low
          impact: high
          mitigation: Interface contract explicitly specifies `const ActionMove BrowserAction = "move"`. Agent F's task references this exact string. The compile-time check catches mismatches.
        - scenario: Agent B defines GitHubClient interface but the existing *github.Client may not implement all methods (e.g. a method signature mismatch). The compile-time assertion `var _ GitHubClient = (*github.Client)(nil)` will catch this but only if Agent B gets the signatures exactly right.
          likelihood: low
          impact: medium
          mitigation: Interface contract provides exact signatures copied from the source files. Agent B must verify against the actual method signatures in assets.go, releases.go, contents.go, and gitops.go before writing the interface.
        - scenario: Agent A's CommitFile test points a *Client at a fake httptest.Server, but CommitFile calls real git commands (os/exec). The git clone will fail fast with 'repository not found' — this is the intended behavior for the error-path test, but if the test environment lacks git, it will fail differently.
          likelihood: low
          impact: low
          mitigation: Agent A's task explicitly limits CommitFile testing to the clone-failure error path. The test asserts the error wraps 'git clone' — any git-not-found failure also returns an error, so the test is robust.
        - scenario: Agent C appends to add_test.go which is owned by Agent C but also references `humanBytes` from cache.go. If humanBytes is actually defined in a different file than cache.go (e.g. helpers.go), Agent C will be confused.
          likelihood: low
          impact: low
          mitigation: Agent C's task instructs it to check the actual file containing humanBytes before writing tests. The constraint is explicit.
known_issues:
    - title: processMigrationBatch uses cobra subcommand re-execution
      description: |
        In internal/app/migrate.go, processMigrationQueue() spawns a new
        newMigrateOneCmd() cobra command for each batch item. The TODO comment in
        the source (line 343) notes this bypasses PersistentPreRunE so cfg/gh are
        not re-initialized per migration. This is a pre-existing design issue,
        not introduced by this feature work.
      status: Pre-existing, unrelated to this work
      workaround: Use 'migrate one' for individual files; 'migrate batch' works correctly when cfg/gh are initialized before the batch command runs.
