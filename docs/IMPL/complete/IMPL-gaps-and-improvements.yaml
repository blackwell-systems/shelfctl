interface_contracts:
    - name: GitHubClientFacade
      description: |
        Interface extracted from *github.Client so app/ commands can be tested
        without real HTTP calls. Covers the methods called by open, shelve,
        sync, browse, and verify. Agent B defines this interface in
        internal/app/interfaces.go; Agent A uses *github.Client directly via
        httptest.NewServer (no facade needed — tests the real struct).
      definition: |
        // GitHubClient abstracts the GitHub API operations used by app commands.
        // Implemented by *github.Client in production and by a fake in tests.
        type GitHubClient interface {
            GetReleaseByTag(owner, repo, tag string) (*github.Release, error)
            EnsureRelease(owner, repo, tag string) (*github.Release, error)
            FindAsset(owner, repo string, releaseID int64, name string) (*github.Asset, error)
            ListReleaseAssets(owner, repo string, releaseID int64) ([]github.Asset, error)
            DownloadAsset(owner, repo string, assetID int64) (io.ReadCloser, error)
            UploadAsset(owner, repo string, releaseID int64, name string, r io.Reader, size int64, contentType string) (*github.Asset, error)
            DeleteAsset(owner, repo string, assetID int64) error
            GetFileContent(owner, repo, path, ref string) ([]byte, string, error)
            CommitFile(owner, repo, filePath string, content []byte, message string) error
        }
      location: internal/app/interfaces.go
    - name: FakeGitHubServer
      description: |
        httptest.Server-backed fake for github/ package tests. Agent A creates
        this in internal/github/client_test.go (package github) so it can
        exercise the private http field and all exported methods end-to-end.
        Not an exported type — test-only helper in _test.go files.
      definition: |
        // newFakeServer spins up an httptest.Server with a mux that handles
        // the GitHub API endpoints needed by each test case.
        // Returns server + *Client pointed at server.URL.
        func newFakeServer(t *testing.T, mux *http.ServeMux) (*httptest.Server, *Client)
      location: internal/github/client_test.go
    - name: ActionMove (BrowserAction constant)
      description: |
        New BrowserAction constant for multi-select move-to-shelf. Agent E adds
        this constant to internal/tui/list_browser.go and the corresponding
        key binding (m key). handleBrowserAction in internal/app/browse.go
        (Wave 2, Agent F) wires it to the existing move logic.
      definition: |
        const ActionMove BrowserAction = "move"
      location: internal/tui/list_browser.go
    - name: BrowserResult.MoveTargetShelf
      description: |
        Added field on BrowserResult so the move action can communicate which
        shelf the selected books should be moved to. Agent E populates this
        after a shelf picker sub-TUI is invoked; Agent F reads it in
        handleBrowserAction.
      definition: |
        type BrowserResult struct {
            Action          BrowserAction
            BookItem        *BookItem   // Single book (open, edit, details)
            BookItems       []BookItem  // Multiple books (download, move)
            MoveTargetShelf string      // Shelf name for ActionMove
        }
      location: internal/tui/list_browser.go
