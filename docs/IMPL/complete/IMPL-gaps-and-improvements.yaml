              the shelf picker (tui.RunShelfPicker returns error "canceled by user") —
              return nil (not an error) so the TUI session ends cleanly.
            - For verify_e2e_test.go: the fakeGitHubClient must implement ALL methods
              of GitHubClient; unused methods return zero values.
            - Do NOT import the `tui` package in verify_e2e_test.go — the verify path
              does not use TUI.
            - The ActionMove handler is a new `case` block ONLY. Do not modify existing
              case blocks for ActionOpen, ActionEdit, ActionShowDetails.
            - verifySingleShelf() also calls cacheMgr.Exists() and cacheMgr.Remove().
              Use `cache.New(t.TempDir())` for cacheMgr in tests — these calls will be
              no-ops since the temp dir is empty (Exists returns false).
          files:
            - internal/app/browse.go
            - internal/app/verify_e2e_test.go
          dependencies:
            - B
            - E
