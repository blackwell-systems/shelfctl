            ## What to Implement

            Add comprehensive test coverage for the `internal/github` package.
            Currently this package has zero test files (`[no test files]` in go test output).
            Cover the three most critical paths: Client construction + HTTP dispatch,
            CommitFile (the git clone/push path), and GetFileContent (including the
            large-file blob fallback).

            The package is `package github` (not `_test`) — use internal access to
            inspect `c.token`, `c.apiBase`, and `c.http` fields directly.

            ## Interfaces to Implement

            None — these are test files using the real *Client struct.

            ## Interfaces to Call

            Use `net/http/httptest` to stand up a fake server. Pattern:

            ```go
            func newFakeServer(t *testing.T, mux *http.ServeMux) (*httptest.Server, *Client) {
                srv := httptest.NewServer(mux)
                t.Cleanup(srv.Close)
                c := New("test-token", srv.URL)
                return srv, c
            }
            ```

            ## Tests to Write

            ### internal/github/client_test.go
            - TestNew_DefaultsAPIBase — empty apiBase uses defaultAPIBase constant
            - TestNew_StripTrailingSlash — trailing slash is stripped from apiBase
            - TestNew_CustomAPIBase — custom base is preserved
            - TestClientDo_SetsAuthHeader — do() injects Authorization: Bearer header
            - TestClientDo_SetsGitHubAPIVersion — do() sets X-GitHub-Api-Version header
            - TestCheckStatus_OK — 200/201/204 return nil
            - TestCheckStatus_NotFound — 404 returns ErrNotFound
            - TestCheckStatus_Unauthorized — 401 returns ErrUnauthorized
            - TestCheckStatus_Forbidden — 403 returns ErrForbidden
            - TestCheckStatus_Conflict — 409 returns ErrConflict
            - TestCheckStatus_UnknownError — 500 returns generic error with status code
            - TestDoJSON_DecodeResponse — doJSON decodes JSON response into struct
            - TestDoJSON_NilBody — doJSON with nil body sends request without body
            - TestDoJSON_ErrorOnBadJSON — doJSON returns error on invalid JSON response

            ### internal/github/contents_test.go
            - TestGetFileContent_SmallFile — fetches base64-encoded file, decodes correctly
            - TestGetFileContent_LargeFileFallback — when encoding=="none" and size>1MB,
              falls back to getRawBlob (verify the Blobs API endpoint is called)
            - TestGetFileContent_NotFound — returns ErrNotFound on 404
            - TestGetFileContent_WithRef — ref query param is appended to URL
            - TestGetFileContent_StripNewlines — base64 with embedded newlines decodes correctly

            ### internal/github/gitops_test.go
            CommitFile invokes real git commands (clone, pull, commit, push). Test the
            helper functions that don't require a live git repo:
            - TestSanitize_RedactsToken — sanitize() replaces token value with ***
            - TestSanitize_NoToken — sanitize() with no token args is a no-op
            - TestCommitFile_CloneError — CommitFile returns error when git clone fails
              (point client at a URL that returns 401 so git clone fails fast)
            - TestRunGit_Success — runGit() with valid args returns nil
            - TestRunGit_Failure — runGit() with invalid command returns error containing
              sanitized output

            ## Verification Gate

            ```bash
            go build ./internal/github/...
            go vet ./internal/github/...
            go test ./internal/github/... -v
            ```

            ## Constraints

            - Package declaration must be `package github` (not `package github_test`)
              so internal fields are accessible.
            - Do NOT make real network calls. All tests use httptest.Server.
            - CommitFile is hard to test end-to-end without a real git server; limit to
