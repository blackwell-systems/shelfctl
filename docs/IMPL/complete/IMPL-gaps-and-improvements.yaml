            ### 2. Tests for open and browse (internal/app/open_test.go, browse_test.go)

            Write table-driven tests for the pure/extractable logic in open.go and browse.go
            that does NOT require TUI or live HTTP. Focus on:
            - `openFile()` logic (the command assembly, not the exec.Start call)
            - `isPDF()` helper
            - `handleBrowserAction` with ActionShowDetails (pure print path, no GitHub calls)
