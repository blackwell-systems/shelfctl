pre_mortem:
    overall_risk: low
    rows:
        - scenario: |
            Agent A or B misreads the current line numbers and edits the wrong call site, leaving one free-function call in the test file. The post-merge test run will immediately surface this as a compile error (undefined: generateHTML).
          likelihood: low
          impact: low
          mitigation: |
            The task description for Agent B lists every affected call site by function name and provides old/new snippets. A compile error is the failure mode, which is fast to diagnose and fix.
        - scenario: |
            An agent accidentally changes the public signature of GenerateHTMLIndex (e.g., removes the books parameter or adds a parameter). This would break callers outside internal/cache.
          likelihood: low
          impact: high
          mitigation: |
            The interface contract explicitly states GenerateHTMLIndex must remain unchanged. The post-merge `go build ./...` (not just ./internal/cache) would immediately catch any external-caller breakage.
        - scenario: |
            The merge of two worktrees touching the same package (but different files) produces a git conflict because both agents modified package-level declarations in html_index.go or cache_internal_test.go simultaneously.
          likelihood: low
          impact: low
          mitigation: |
            Agent A owns html_index.go exclusively; Agent B owns cache_internal_test.go exclusively. There is no file overlap, so git will merge cleanly with no conflicts.
