      location: internal/cache/html_index.go
waves:
    - number: 1
      agents:
        - id: A
          task: |
            ## What to Implement

            Refactor `internal/cache/html_index.go` to convert the three free
            functions `generateHTML`, `renderBookCard`, and `renderUncachedCard`
            into methods on `*Manager`.

            **Rules:**
            - The public method `GenerateHTMLIndex(books []IndexBook) error` must
              keep its exact signature unchanged. Only its internal call site
              changes: `generateHTML(books, m.baseDir)` becomes `m.generateHTML(books)`.
            - Remove the `baseDir string` parameter from `generateHTML`.
              Inside the method body, replace all references to the `baseDir`
              local/parameter with `m.baseDir`.
            - Remove the `baseDir string` parameter from `renderBookCard`.
              Replace the `filepath.Rel(baseDir, book.CoverPath)` call with
              `filepath.Rel(m.baseDir, book.CoverPath)`.
            - Promote `renderUncachedCard` to a method for consistency. Its
              current signature `func renderUncachedCard(s *strings.Builder, book IndexBook, index int)`
              gains a `*Manager` receiver; no other parameter changes are needed
              (it never used baseDir).
            - Update the internal call site in `generateHTML` (now `m.generateHTML`)
              where `renderBookCard(&s, book, bookIndex, baseDir)` is called — change
              to `m.renderBookCard(&s, book, bookIndex)`.
            - Update the internal call site where `renderUncachedCard(&s, book, bookIndex)`
              is called — change to `m.renderUncachedCard(&s, book, bookIndex)`.
            - Do NOT change the `IndexBook` type, any import paths, or any logic
              inside the functions. This is a pure structural refactor.

            ## New Method Signatures to Deliver

            ```go
            func (m *Manager) generateHTML(books []IndexBook) string
            func (m *Manager) renderBookCard(s *strings.Builder, book IndexBook, index int)
            func (m *Manager) renderUncachedCard(s *strings.Builder, book IndexBook, index int)
            func (m *Manager) GenerateHTMLIndex(books []IndexBook) error  // public — unchanged
            ```

            ## Tests to Write

            None. Agent A owns only the implementation file. Test updates are
            handled by Agent B in a parallel worktree. After merge, the full
            suite in `go test ./internal/cache/...` serves as verification.

            ## Verification Gate

            Run these commands inside the agent's worktree after completing the
            refactor. Note: `cache_internal_test.go` calls the old free-function
            signatures, so the package will not compile until both worktrees are
            merged. Verify using build-only (not test) in isolation:

            ```bash
            # Build-only check (tests will fail until merge with Agent B's changes)
            go build ./internal/cache/...
            go vet ./internal/cache/...
            ```

            The test command (`go test ./internal/cache/...`) will succeed only
            after merging both Agent A and Agent B's worktrees.

            ## Constraints

            - Do not change `GenerateHTMLIndex`'s public signature.
            - Do not rename `IndexBook` or any of its fields.
            - Do not add, remove, or reorder any imports unless one becomes unused
              after the refactor (the `path/filepath` import remains used inside
              `renderBookCard` for `filepath.Rel`).
            - Do not alter HTML output, CSS, or JavaScript content inside
              `generateHTML`.
          files:
            - internal/cache/html_index.go
        - id: B
          task: |
            ## What to Implement

            Update `internal/cache/cache_internal_test.go` to call the new
            `*Manager` method forms of `generateHTML`, `renderBookCard`, and
            `renderUncachedCard` that Agent A produces in `html_index.go`.

            The test file is in `package cache` (a white-box test file) so it
            has access to unexported methods on `*Manager`.

            **Current call sites to update (exact locations in the file):**

            1. `TestGenerateHTML_Empty` (line ~181):
               ```go
               // OLD:
               html := generateHTML(nil, "/tmp")
               // NEW:
               m := New("/tmp")
               html := m.generateHTML(nil)
               ```

            2. `TestGenerateHTML_WithBooks` (line ~193):
               ```go
