               html := generateHTML(books, "/tmp")
               // NEW:
               m := New("/tmp")
               html := m.generateHTML(books)
               ```

            3. `TestGenerateHTML_UncachedSection` (line ~214):
               ```go
               // OLD:
               html := generateHTML(books, "/tmp")
               // NEW:
               m := New("/tmp")
               html := m.generateHTML(books)
               ```

            4. `TestRenderBookCard_WithCover` (line ~294):
               ```go
               // OLD:
               renderBookCard(&s, book, 0, "/tmp")
               // NEW:
               m := New("/tmp")
               m.renderBookCard(&s, book, 0)
               ```

            5. `TestRenderBookCard_NoCover` (line ~318):
               ```go
               // OLD:
               renderBookCard(&s, book, 0, "/tmp")
               // NEW:
               m := New("/tmp")
               m.renderBookCard(&s, book, 0)
               ```

            6. `TestRenderUncachedCard` (line ~238):
               ```go
               // OLD:
               renderUncachedCard(&s, book, 0)
               // NEW:
               m := New("")
               m.renderUncachedCard(&s, book, 0)
               ```

            7. `TestGenerateHTML_TagFilters` (line ~337):
               ```go
               // OLD:
               html := generateHTML(books, "/tmp")
               // NEW:
               m := New("/tmp")
               html := m.generateHTML(books)
               ```

            8. `TestGenerateHTML_CachedCountSubtitle` (line ~358):
               ```go
               // OLD:
               html := generateHTML(books, "/tmp")
               // NEW:
               m := New("/tmp")
               html := m.generateHTML(books)
               ```

            **No test logic changes.** Only the call sites change. All assertions
            remain identical. The `m.GenerateHTMLIndex` test (`TestGenerateHTMLIndex`)
            already calls the public method through `*Manager` and requires no change.

            ## New Method Signatures Being Called (from Agent A)

            ```go
            func (m *Manager) generateHTML(books []IndexBook) string
            func (m *Manager) renderBookCard(s *strings.Builder, book IndexBook, index int)
            func (m *Manager) renderUncachedCard(s *strings.Builder, book IndexBook, index int)
            ```

            ## Verification Gate

            In this worktree, Agent A's changes are not present, so the package
            will not compile (the old free-function signatures are gone from
            Agent B's perspective). Verify the diff is correct by reviewing the
            updated call sites manually and confirming no test logic was altered.

            After merge of both worktrees, the full verification is:

            ```bash
            go build ./internal/cache/...
            go vet ./internal/cache/...
            go test ./internal/cache/...
            ```

            ## Constraints

            - Do not change any test assertions or test logic — only call sites.
            - Do not add new test cases.
            - Use `New(baseDir)` to construct the manager in each test; reuse the
              existing `dir := t.TempDir()` variable where available, or use a
              literal string like `"/tmp"` matching what the original call used.
            - `TestRenderUncachedCard` passes an empty `baseDir` to `New("")`
              because `renderUncachedCard` never uses `m.baseDir` — any value works.
          files:
            - internal/cache/cache_internal_test.go
